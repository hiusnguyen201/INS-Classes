spring.application.name=ins-classes-be
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3307/ins_classes?serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.data.web.pageable.one-indexed-parameters=true

app.jwt.secret=ins-classes-dev-secret-change-me-in-production-0123456789abcdef
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=1209600000